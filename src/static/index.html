<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpiRobs Object Detection &amp; Depth</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, -apple-system, sans-serif;
      background: #0f1115; color: #e6e6e6; display: flex; flex-direction: column;
      align-items: center; min-height: 100vh; padding: 1.5rem;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 1rem; }
    /* The stage reserves its space before the camera ever starts, so the page
       does not reflow when the first frame arrives.
       A camera's resolution cannot be known without calling getUserMedia(),
       which would pop the permission prompt on page load just to measure it.
       So: assume a 4:3 box, then remember the real aspect ratio (below) once
       the camera has run once, and reuse it on later visits. */
    .stage {
      position: relative;
      width: min(100%, 720px);
      aspect-ratio: var(--stage-aspect, 4 / 3);
      background: #232833;                 /* grey, so the slot reads as "a
                                              picture goes here" rather than
                                              as an empty gap */
      border: 1px solid #333844;
      border-radius: 10px;
      overflow: hidden;
    }
    /* Video and overlay fill the same rect, which is what lets box coordinates
       map 1:1 between the two. */
    .stage video, .stage canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
    }
    .stage video { object-fit: contain; }
    .placeholder {
      position: absolute; inset: 0; margin: 0;
      display: grid; place-items: center;
      color: #7f8899; font-size: .95rem; line-height: 1.5;
      text-align: center; padding: 1rem; pointer-events: none;
    }
    .controls {
      display: flex; gap: .75rem; align-items: center; flex-wrap: wrap;
      margin: 1rem 0; line-height: 1.4;
    }
    button {
      background: #2d6cdf; color: #fff; border: 0; padding: .55rem 1rem;
      border-radius: 8px; font-size: .95rem; cursor: pointer;
    }
    button.secondary { background: #333844; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    label { font-size: .9rem; color: #b9c0cc; }
    input[type=range] { vertical-align: middle; }
    .status { font-size: .85rem; color: #9aa4b2; min-height: 1.2em; }
    .legend { font-size: .85rem; color: #cbd3e0; max-width: 640px; text-align: center; }
    .modes { display: flex; gap: .4rem; background: #1a1d24; padding: .25rem;
             border-radius: 9px; flex-wrap: wrap; justify-content: center; }
    .modes button { background: transparent; color: #b9c0cc; padding: .4rem .9rem; }
    .modes button.active { background: #2d6cdf; color: #fff; }
    /* Controls are hidden with `visibility`, not `display`, so they keep
       occupying their slot in the flex row. With `display: none` the row got
       narrower outside its mode and, because the page centres its content, the
       surrounding buttons visibly jumped sideways on every mode switch.
       `visibility: hidden` also keeps the control out of the tab order and deaf
       to clicks, so it cannot be focused or changed while invisible. */
    .invisible { visibility: hidden; }
    /* Fixed-width slot for the query box, so the mode buttons never move. */
    .mode-extra { width: 15rem; }
    #query { width: 100%; }
    #query, #depthLevel {
      background: #1a1d24; border: 1px solid #333844; color: #e6e6e6;
      padding: .5rem .7rem; border-radius: 8px; font-size: .95rem;
    }
    #query:focus, #depthLevel:focus { outline: 2px solid #2d6cdf; outline-offset: -1px; }
    /* Greyed out rather than hidden outside the query-driven modes. `disabled`
       also keeps it out of the tab order and deaf to typing, so it cannot be
       edited while it is not in use. */
    #query:disabled {
      background: #15171c; border-color: #262a33; color: #5b6473;
      cursor: not-allowed;
    }
    #query:disabled::placeholder { color: #4a515e; }
    /* Only "Distance to point" is click-driven; elsewhere the canvas is just an
       overlay and a crosshair cursor would promise something that does nothing. */
    .stage.clickable canvas { cursor: crosshair; }
    .verdict { font-size: 1.05rem; font-weight: 600; min-height: 1.4em; }
    .verdict.found { color: #4ade80; }
    .verdict.missing { color: #f87171; }
  </style>
</head>
<body>
  <h1>SpiRobs · Object Detection &amp; Depth (webcam)</h1>

  <div class="controls">
    <div class="modes">
      <button id="modeDetect" class="active">Detect all</button>
      <button id="modeFind">Find one object</button>
      <button id="modeDepth">Depth map</button>
      <button id="modePoint">Distance to point</button>
      <button id="modeLocate">Distance to object</button>
    </div>
    <div class="mode-extra">
      <!-- Always visible, disabled in the modes that have nothing to search
           for: a box that vanishes and reappears is harder to find again than
           one that is simply greyed out, and its presence shows the two
           query-driven modes exist. -->
      <input id="query" type="text" placeholder="e.g. blue cup" disabled />
    </div>
  </div>

  <div class="stage" id="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <p class="placeholder" id="placeholder">Camera off — press “Start camera”.</p>
  </div>

  <div class="controls">
    <button id="startBtn">Start camera</button>
    <button id="stopBtn" class="secondary" disabled>Stop</button>
    <label>Detection rate:
      <input id="fps" type="range" min="1" max="15" value="6" />
      <span id="fpsVal">6</span>/s
    </label>
    <!-- Depth cost is ~97% model inference, and this dial is the model's
         internal working resolution: higher = more detail, slower. Hidden
         rather than removed outside depth mode, so this row's width never
         changes. -->
    <label id="depthQuality" class="invisible">Depth quality:
      <select id="depthLevel"
              title="Sets the depth model's internal resolution — higher quality resolves finer detail but runs slower.">
        <option value="0">Fastest</option>
        <option value="2">Fast</option>
        <option value="4" selected>Balanced</option>
        <option value="6">Detailed</option>
        <option value="9">Best — finest detail</option>
      </select>
    </label>
  </div>

  <p class="verdict" id="verdict"></p>
  <p class="status" id="status">Click “Start camera”. Your browser will ask for webcam permission.</p>
  <p class="legend" id="legend"></p>

  <script>
    const video = document.getElementById('video');
    const overlay = document.getElementById('overlay');
    const ctx = overlay.getContext('2d');
    const stageEl = document.getElementById('stage');
    const placeholderEl = document.getElementById('placeholder');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusEl = document.getElementById('status');
    const legendEl = document.getElementById('legend');
    const fpsSlider = document.getElementById('fps');
    const fpsVal = document.getElementById('fpsVal');
    const modeDetectBtn = document.getElementById('modeDetect');
    const modeFindBtn = document.getElementById('modeFind');
    const modeDepthBtn = document.getElementById('modeDepth');
    const modeLocateBtn = document.getElementById('modeLocate');
    const modePointBtn = document.getElementById('modePoint');
    const queryEl = document.getElementById('query');
    const depthLevelEl = document.getElementById('depthLevel');
    const depthQualityEl = document.getElementById('depthQuality');
    const verdictEl = document.getElementById('verdict');

    // Offscreen canvas used to grab a JPEG frame to send to the server.
    const grabber = document.createElement('canvas');
    const gctx = grabber.getContext('2d');

    // 'detect' = everything in classes.py, 'find' = one described object,
    // 'depth' = metric depth map (independent of the other two), 'point' =
    // distance to a clicked pixel (depth only, no detector), 'locate' =
    // find + depth combined into a distance and a bearing to one object.
    let mode = 'detect';
    // The pixel last clicked in 'point' mode, in the frame's own coordinates.
    // It persists across frames: click once and the measurement keeps updating
    // as the scene moves, which is what makes it useful live.
    let clickedPoint = null;
    let stream = null;
    let timer = null;
    let busy = false;             // avoid overlapping in-flight requests
    let inflight = null;          // AbortController for the request in flight
    let resetDepthRange = true;   // ask the server to re-lock the colour ramp
    let haveProcessedFrame = false;  // is there a frame in `grabber` to freeze?
    // The query is only *committed* on Enter, on blur, or after a typing
    // pause. Reading queryEl.value straight from the request loop would search
    // for half-typed words -- typing "person" fired a request for "p".
    let committedQuery = '';
    let queryTimer = null;
    const QUERY_DEBOUNCE_MS = 500;
    const colorCache = {};

    // Size the stage to the camera's real aspect ratio, and remember it. The
    // first visit has to guess (the CSS default, 4:3), but every visit after
    // that reserves exactly the right box, so pressing Start does not resize
    // anything. localStorage can throw in private/blocked contexts, hence the
    // try/catch around both ends -- remembering is a nicety, not a requirement.
    const ASPECT_KEY = 'spirobs.stageAspect';

    function applyStageAspect(w, h) {
      if (!w || !h) return;
      stageEl.style.setProperty('--stage-aspect', `${w} / ${h}`);
      try {
        localStorage.setItem(ASPECT_KEY, `${w} / ${h}`);
      } catch (err) { /* not remembered; harmless */ }
    }

    try {
      const remembered = localStorage.getItem(ASPECT_KEY);
      if (remembered) stageEl.style.setProperty('--stage-aspect', remembered);
    } catch (err) { /* fall back to the CSS default */ }

    // Writing the same status text every frame (6x/second) resets any text
    // selection, which made an error message nearly impossible to copy. Only
    // touch the DOM when the text actually changes.
    function setStatus(text) {
      if (statusEl.textContent !== text) statusEl.textContent = text;
    }

    // Drop whatever is in flight. Called whenever its result has become
    // irrelevant (mode switch, stop), so a late reply cannot be applied to a
    // screen it was never about.
    function abortInflight() {
      if (inflight) { inflight.abort(); inflight = null; }
      busy = false;
    }

    const needsQuery = (m) => m === 'find' || m === 'locate';
    const usesDepth = (m) => m === 'depth' || m === 'locate' || m === 'point';

    function setMode(next) {
      if (next === mode) return;
      mode = next;
      abortInflight();
      modeDetectBtn.classList.toggle('active', next === 'detect');
      modeFindBtn.classList.toggle('active', next === 'find');
      modeDepthBtn.classList.toggle('active', next === 'depth');
      modeLocateBtn.classList.toggle('active', next === 'locate');
      modePointBtn.classList.toggle('active', next === 'point');
      // The text box stays put and greys out; the quality dial is needed by
      // every mode that runs the depth model.
      queryEl.disabled = !needsQuery(next);
      // Toggle the whole label, so its "Depth quality:" text hides too.
      depthQualityEl.classList.toggle('invisible', !usesDepth(next));
      stageEl.classList.toggle('clickable', next === 'point');
      // A point measured in one mode says nothing about the next one, and a
      // stale marker left on screen would look like a live reading.
      clickedPoint = null;
      verdictEl.textContent = '';
      verdictEl.className = 'verdict';
      legendEl.textContent = '';
      ctx.clearRect(0, 0, overlay.width, overlay.height);
      // The colour ramp is locked to the first frame the server sees, so a
      // fresh depth session must ask it to re-lock to the current scene.
      resetDepthRange = true;
      if (needsQuery(next)) queryEl.focus();
      setStatus(stream ? 'Running…' : 'Stopped.');
    }

    modeDetectBtn.addEventListener('click', () => setMode('detect'));
    modeFindBtn.addEventListener('click', () => setMode('find'));
    modeDepthBtn.addEventListener('click', () => setMode('depth'));
    modeLocateBtn.addEventListener('click', () => setMode('locate'));
    modePointBtn.addEventListener('click', () => setMode('point'));

    // Point mode: a click picks the pixel to measure. The overlay is stretched
    // to the stage box by CSS while its backing store stays at the video's
    // native size, so the click has to be scaled by that same factor —
    // otherwise every measurement lands somewhere other than where you clicked.
    overlay.addEventListener('click', (e) => {
      if (mode !== 'point' || !stream) return;
      const rect = overlay.getBoundingClientRect();
      if (!rect.width || !rect.height) return;
      clickedPoint = {
        x: (e.clientX - rect.left) * (overlay.width / rect.width),
        y: (e.clientY - rect.top) * (overlay.height / rect.height),
      };
      // Mark it immediately rather than waiting for the round trip, so the
      // click feels answered even while the depth model is still working.
      drawPointMarker(clickedPoint, null);
      abortInflight();   // the in-flight reply is about the previous pixel
    });

    function commitQuery() {
      if (queryTimer) { clearTimeout(queryTimer); queryTimer = null; }
      const next = queryEl.value.trim();
      if (next === committedQuery) return;
      committedQuery = next;
      // The previous query's answer says nothing about the new one.
      abortInflight();
      verdictEl.textContent = '';
      verdictEl.className = 'verdict';
      ctx.clearRect(0, 0, overlay.width, overlay.height);
    }

    queryEl.addEventListener('input', () => {
      if (queryTimer) clearTimeout(queryTimer);
      queryTimer = setTimeout(commitQuery, QUERY_DEBOUNCE_MS);
    });
    // Changing quality should take effect on the next frame, not after the
    // in-flight one at the old setting finishes.
    depthLevelEl.addEventListener('change', abortInflight);

    queryEl.addEventListener('blur', commitQuery);
    queryEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); commitQuery(); }
    });

    function colorFor(id) {
      if (!colorCache[id]) {
        // Deterministic hue per class id.
        const hue = (id * 47) % 360;
        colorCache[id] = `hsl(${hue} 90% 60%)`;
      }
      return colorCache[id];
    }

    fpsSlider.addEventListener('input', () => {
      fpsVal.textContent = fpsSlider.value;
      if (timer) { restartLoop(); }
    });

    startBtn.addEventListener('click', start);
    stopBtn.addEventListener('click', stop);

    async function start() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      } catch (err) {
        setStatus('Could not access camera: ' + err.message);
        return;
      }
      video.srcObject = stream;
      await video.play();
      overlay.width = video.videoWidth;
      overlay.height = video.videoHeight;
      grabber.width = video.videoWidth;
      grabber.height = video.videoHeight;
      // Now the true resolution is known: match the reserved box to it (a
      // no-op on every visit after the first) and drop the placeholder.
      applyStageAspect(video.videoWidth, video.videoHeight);
      placeholderEl.classList.add('invisible');
      startBtn.disabled = true;
      stopBtn.disabled = false;
      setStatus('Running…');
      resetDepthRange = true;
      // Drop the frozen frame from the previous session, otherwise it would
      // sit on top of the live view until the first result comes back.
      haveProcessedFrame = false;
      // A point clicked in the previous session was aimed at a scene that is
      // now gone.
      clickedPoint = null;
      ctx.clearRect(0, 0, overlay.width, overlay.height);
      verdictEl.textContent = '';
      verdictEl.className = 'verdict';
      legendEl.textContent = '';
      restartLoop();
    }

    // Bake the last processed frame + its annotations into the overlay, so the
    // stopped view stays on screen and can be screenshotted at leisure.
    //
    // Stopping the tracks does NOT leave the <video> showing its final frame --
    // it blanks, and since the overlay only holds annotations (transparent
    // between the boxes) the result was a black screen. Compositing onto the
    // canvas makes the frozen view independent of whatever the video element
    // decides to render.
    //
    // `grabber` still holds the exact frame that was last sent for processing,
    // so the image and the boxes drawn over it are from the same moment.
    function freezeFrame() {
      if (!overlay.width || !overlay.height) return;

      // Annotations first: drawing the photo underneath means copying them out
      // and back, as a canvas has no way to draw *below* existing content.
      const annotations = document.createElement('canvas');
      annotations.width = overlay.width;
      annotations.height = overlay.height;
      annotations.getContext('2d').drawImage(overlay, 0, 0);

      ctx.clearRect(0, 0, overlay.width, overlay.height);
      try {
        // Fall back to the live video if no frame has been processed yet
        // (Stop pressed immediately after Start).
        const source = haveProcessedFrame ? grabber : video;
        ctx.drawImage(source, 0, 0, overlay.width, overlay.height);
      } catch (err) {
        /* nothing capturable; the annotations alone are better than nothing */
      }
      ctx.drawImage(annotations, 0, 0);
    }

    function stop() {
      if (timer) { clearInterval(timer); timer = null; }
      // Abort BEFORE stopping the tracks. A request already on its way carries
      // a frame grabbed from a camera that is about to go away; letting it land
      // used to surface as a spurious error just as the user pressed Stop.
      abortInflight();
      freezeFrame();                       // while the camera is still alive
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      startBtn.disabled = false;
      stopBtn.disabled = true;
      setStatus('Stopped.');
      // Verdict and legend are deliberately left in place: they are part of the
      // result being screenshotted.
    }

    // Every response must be read as text first: an unexpected non-JSON body
    // (a proxy error page, say) would otherwise throw an opaque
    // "Unexpected token" parse error that hides the real status.
    async function readJson(resp) {
      const text = await resp.text();
      try {
        return JSON.parse(text);
      } catch {
        return { error: `server ${resp.status}: ${text.slice(0, 100)}` };
      }
    }

    function restartLoop() {
      if (timer) clearInterval(timer);
      const interval = 1000 / Number(fpsSlider.value);
      timer = setInterval(tick, interval);
    }

    async function tick() {
      if (busy || !stream) return;

      // In the query-driven modes an empty box means there is nothing to look
      // for yet.
      const query = committedQuery;
      if (needsQuery(mode) && !query) {
        setStatus('');
        ctx.clearRect(0, 0, overlay.width, overlay.height);
        return;
      }
      // Same idea in point mode: nothing clicked yet, nothing to measure. No
      // request is sent, so idling here costs nothing.
      const target = clickedPoint;
      if (mode === 'point' && !target) {
        setStatus('Click anywhere on the video to measure that point.');
        return;
      }

      // Tag the request with the mode and query it was sent FOR. The reply is
      // applied only if that still matches when it arrives -- otherwise
      // switching tabs mid-request fed a depth reply to the find renderer,
      // which rendered it as 'not found: undefined'.
      const requestMode = mode;
      const controller = new AbortController();
      inflight = controller;
      busy = true;
      try {
        gctx.drawImage(video, 0, 0, grabber.width, grabber.height);
        haveProcessedFrame = true;
        const blob = await new Promise(res => grabber.toBlob(res, 'image/jpeg', 0.7));
        if (!blob) throw new Error('could not capture a frame');
        const form = new FormData();
        form.append('frame', blob, 'frame.jpg');
        if (needsQuery(requestMode)) form.append('query', query);
        if (usesDepth(requestMode)) form.append('level', depthLevelEl.value);
        if (requestMode === 'depth' && resetDepthRange) form.append('reset', '1');
        if (requestMode === 'point') {
          form.append('x', target.x.toFixed(1));
          form.append('y', target.y.toFixed(1));
        }

        const endpoint = { find: '/find', depth: '/depth', locate: '/locate',
                           point: '/point' }[requestMode] || '/detect';
        const t0 = performance.now();
        const resp = await fetch(endpoint,
                                 { method: 'POST', body: form, signal: controller.signal });
        const data = await readJson(resp);
        const ms = (performance.now() - t0).toFixed(0);

        // Stale reply: the user moved on while it was in flight. Drop it
        // silently -- it is not an error, and rendering it would be wrong.
        // `target` is compared by identity: every click installs a fresh object,
        // so a reply about the pixel you clicked before last is dropped here.
        if (requestMode !== mode || query !== committedQuery
            || target !== clickedPoint || !stream) return;
        if (!resp.ok) throw new Error(data.error || ('server ' + resp.status));

        if (requestMode === 'find') {
          drawFindResult(data);
          setStatus(`${ms} ms/frame`);
        } else if (requestMode === 'locate') {
          drawLocateResult(data);
          setStatus(`${ms} ms/frame`);
        } else if (requestMode === 'point') {
          drawPointResult(data, target);
          setStatus(`${ms} ms/frame`);
        } else if (requestMode === 'depth') {
          resetDepthRange = false;
          await drawDepth(data);
          const centre = data.stats.centre_m;
          verdictEl.textContent =
            centre === null ? 'centre: no valid depth' : `centre: ${centre.toFixed(2)} m`;
          verdictEl.className = 'verdict';
          setStatus(`${ms} ms/frame`);
        } else {
          drawDetections(data);
          setStatus(`${ms} ms/frame`);
        }
      } catch (err) {
        // An abort is us cancelling deliberately (Stop / mode switch), not a
        // failure -- reporting it is exactly the noise this is meant to avoid.
        if (err.name === 'AbortError') return;
        const prefix = { depth: 'Depth error: ', locate: 'Measurement error: ',
                         point: 'Measurement error: ' }[requestMode]
          || 'Detection error: ';
        setStatus(prefix + err.message);
      } finally {
        if (inflight === controller) inflight = null;
        busy = false;
      }
    }

    // Depth mode: the server renders the colourised map (so the browser and the
    // CLI produce identical images) and sends it back as a JPEG data URL, which
    // we paint over the whole overlay — it replaces the video rather than
    // annotating it.
    const depthImg = new Image();

    function drawDepth(data) {
      // Only surface the CPU fallback warning — it costs ~200x (≈45 s/frame vs
      // ≈0.2 s), so say so instead of letting the tab just look broken. The
      // near/far/FOV readout is dropped as routine noise.
      legendEl.textContent = data.device === 'cpu'
        ? '⚠ running on CPU — rebuild the dev container for GPU passthrough'
        : '';
      return new Promise((resolve, reject) => {
        depthImg.onload = () => {
          ctx.clearRect(0, 0, overlay.width, overlay.height);
          ctx.drawImage(depthImg, 0, 0, overlay.width, overlay.height);
          resolve();
        };
        depthImg.onerror = () => reject(new Error('could not decode depth image'));
        depthImg.src = data.image;
      });
    }

    // Find mode: at most ONE box, plus a big found / not-found verdict — the
    // browser equivalent of what `python -m src.find` prints to the console.
    function drawFindResult(data) {
      ctx.clearRect(0, 0, overlay.width, overlay.height);
      legendEl.textContent = '';
      const query = data.query || committedQuery;

      if (!data.found) {
        verdictEl.textContent = `not found: “${query}”`;
        verdictEl.className = 'verdict missing';
        return;
      }

      const d = data.match;
      verdictEl.textContent =
        `found “${query}” · ${(d.confidence * 100).toFixed(0)}%`;
      verdictEl.className = 'verdict found';

      ctx.lineWidth = Math.max(3, overlay.width / 300);
      ctx.font = `${Math.max(14, overlay.width / 40)}px system-ui, sans-serif`;
      ctx.textBaseline = 'top';
      ctx.strokeStyle = '#4ade80';
      ctx.strokeRect(d.x1, d.y1, d.x2 - d.x1, d.y2 - d.y1);

      const text = `${query} ${(d.confidence * 100).toFixed(0)}%`;
      const tw = ctx.measureText(text).width;
      const th = parseInt(ctx.font, 10) * 1.2;
      ctx.fillStyle = '#4ade80';
      ctx.fillRect(d.x1, Math.max(0, d.y1 - th), tw + 8, th);
      ctx.fillStyle = '#000';
      ctx.fillText(text, d.x1 + 4, Math.max(0, d.y1 - th) + 2);
    }

    // Locate mode: the find box, plus the two numbers this whole feature exists
    // for. The frame is left alone (no depth colours over it) — the point is to
    // see the object and read its distance and bearing off it.
    function drawLocateResult(data) {
      ctx.clearRect(0, 0, overlay.width, overlay.height);
      legendEl.textContent = '';
      const query = data.query || committedQuery;

      if (!data.found) {
        verdictEl.textContent = `not found: “${query}”`;
        verdictEl.className = 'verdict missing';
        return;
      }
      // Found but not measurable is its own outcome: the box is real, the depth
      // model just had no valid geometry inside it. Showing the box without a
      // distance is more honest than a made-up number.
      if (!data.measured) {
        verdictEl.textContent = `found “${query}” · distance unknown`;
        verdictEl.className = 'verdict missing';
        legendEl.textContent = 'No valid depth inside the box — move closer or '
          + 'try a higher depth quality.';
        drawLocateBox(data.match, query, null);
        return;
      }

      const loc = data.location;
      const side = Math.abs(loc.bearing_deg) < 0.5
        ? 'straight ahead'
        : `${Math.abs(loc.bearing_deg).toFixed(0)}° ${loc.bearing_deg > 0 ? 'right' : 'left'}`;
      verdictEl.textContent =
        `“${query}” · ${loc.distance_m.toFixed(2)} m · ${side}`;
      verdictEl.className = 'verdict found';

      // Only warnings reach the legend now; the routine near-surface / angle
      // readout was dropped as noise.
      const warnings = [];
      if (data.device === 'cpu') {
        warnings.push('⚠ running on CPU — rebuild the dev container for GPU passthrough');
      }
      if (loc.valid_fraction < 0.5) {
        warnings.push(`⚠ only ${(loc.valid_fraction * 100).toFixed(0)}% of the sampled region had valid depth`);
      }
      legendEl.textContent = warnings.join(' · ');

      drawLocateBox(data.match, query, loc);
      drawBearingBar(loc);
    }

    // Point mode: no detector, no box — just the pixel you clicked and what the
    // depth model says about it. The frame stays in its own colours; the marker
    // sits where you clicked so it is obvious which reading belongs to it.
    function drawPointResult(data, target) {
      if (!data.measured) {
        verdictEl.textContent = 'no valid depth at that point';
        verdictEl.className = 'verdict missing';
        legendEl.textContent = 'The depth model found no geometry there — sky, a '
          + 'mirror or a blown-out highlight will do that. Try a nearby point.';
        drawPointMarker(target, null, 'no depth');
        return;
      }

      const loc = data.location;
      const side = Math.abs(loc.bearing_deg) < 0.5
        ? 'straight ahead'
        : `${Math.abs(loc.bearing_deg).toFixed(0)}° ${loc.bearing_deg > 0 ? 'right' : 'left'}`;
      verdictEl.textContent = `${loc.distance_m.toFixed(2)} m · ${side}`;
      verdictEl.className = 'verdict found';

      // Only the CPU-fallback warning reaches the legend now; the routine
      // elevation / bearing-source readout was dropped as noise.
      legendEl.textContent = data.device === 'cpu'
        ? '⚠ running on CPU — rebuild the dev container for GPU passthrough'
        : '';

      drawPointMarker(target, loc);
      drawBearingBar(loc);
    }

    // Also called straight from the click handler, before any measurement
    // exists, so `loc` may be null — `pending` is then the caption to show
    // instead of a distance.
    function drawPointMarker(target, loc, pending = 'measuring…') {
      if (!target) return;
      ctx.clearRect(0, 0, overlay.width, overlay.height);

      const arm = Math.max(8, overlay.width / 45);
      ctx.lineWidth = Math.max(2, overlay.width / 350);
      ctx.strokeStyle = '#4ade80';
      ctx.beginPath();
      ctx.moveTo(target.x - arm, target.y); ctx.lineTo(target.x + arm, target.y);
      ctx.moveTo(target.x, target.y - arm); ctx.lineTo(target.x, target.y + arm);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(target.x, target.y, arm * 0.45, 0, Math.PI * 2);
      ctx.stroke();

      const size = Math.max(15, overlay.width / 38);
      ctx.font = `${size}px system-ui, sans-serif`;
      ctx.textBaseline = 'top';
      const text = loc
        ? `${loc.distance_m.toFixed(2)} m · ${loc.bearing_deg >= 0 ? '+' : ''}${loc.bearing_deg.toFixed(0)}°`
        : pending;
      const tw = ctx.measureText(text).width + 10;
      const lh = size * 1.25;
      // Keep the caption on screen when the click is near an edge.
      const lx = Math.min(Math.max(0, target.x + arm), overlay.width - tw);
      const ly = Math.min(Math.max(0, target.y - arm - lh), overlay.height - lh);
      ctx.fillStyle = '#4ade80';
      ctx.fillRect(lx, ly, tw, lh);
      ctx.fillStyle = '#000';
      ctx.fillText(text, lx + 5, ly + lh * 0.12);
    }

    function drawLocateBox(d, query, loc) {
      ctx.lineWidth = Math.max(3, overlay.width / 300);
      ctx.strokeStyle = '#4ade80';
      ctx.strokeRect(d.x1, d.y1, d.x2 - d.x1, d.y2 - d.y1);

      // Crosshair on the point the measurement refers to — the middle of the
      // object, not its nearest corner.
      const cx = (d.x1 + d.x2) / 2, cy = (d.y1 + d.y2) / 2;
      const arm = Math.max(6, overlay.width / 60);
      ctx.beginPath();
      ctx.moveTo(cx - arm, cy); ctx.lineTo(cx + arm, cy);
      ctx.moveTo(cx, cy - arm); ctx.lineTo(cx, cy + arm);
      ctx.stroke();

      const size = Math.max(15, overlay.width / 38);
      ctx.font = `${size}px system-ui, sans-serif`;
      ctx.textBaseline = 'top';
      const lines = loc
        ? [`${query} ${(d.confidence * 100).toFixed(0)}%`,
           `${loc.distance_m.toFixed(2)} m · ${loc.bearing_deg >= 0 ? '+' : ''}${loc.bearing_deg.toFixed(0)}°`]
        : [`${query} ${(d.confidence * 100).toFixed(0)}%`, 'distance unknown'];
      const lh = size * 1.25;
      const tw = Math.max(...lines.map(t => ctx.measureText(t).width)) + 10;
      const top = Math.max(0, d.y1 - lh * lines.length);
      ctx.fillStyle = '#4ade80';
      ctx.fillRect(d.x1, top, tw, lh * lines.length);
      ctx.fillStyle = '#000';
      lines.forEach((t, i) => ctx.fillText(t, d.x1 + 5, top + lh * i + lh * 0.12));
    }

    // Horizontal strip spanning the camera's field of view, with the object
    // marked on it — the bearing as a picture rather than a number. Mirrors
    // what src/locator.py draws into the CLI's annotated output.
    function drawBearingBar(loc) {
      if (!loc.fov_x_deg) return;
      const w = overlay.width, h = overlay.height;
      const margin = Math.max(10, w * 0.05);
      const y = h - Math.max(18, h * 0.07);

      ctx.lineWidth = Math.max(1, w / 640);
      ctx.strokeStyle = 'rgba(230,230,230,.85)';
      ctx.beginPath();
      ctx.moveTo(margin, y); ctx.lineTo(w - margin, y);
      for (const frac of [0, 0.5, 1]) {
        const tx = margin + frac * (w - 2 * margin);
        ctx.moveTo(tx, y - 5); ctx.lineTo(tx, y + 5);
      }
      ctx.stroke();

      // Clamped: an object at the very edge of frame can land marginally
      // outside the nominal FOV, and a marker off the strip would just vanish.
      const frac = Math.min(1, Math.max(0, 0.5 + loc.bearing_deg / loc.fov_x_deg));
      const mx = margin + frac * (w - 2 * margin);
      const size = Math.max(7, h / 55);
      ctx.fillStyle = '#4ade80';
      ctx.beginPath();
      ctx.moveTo(mx, y);
      ctx.lineTo(mx - size, y - size * 1.4);
      ctx.lineTo(mx + size, y - size * 1.4);
      ctx.closePath();
      ctx.fill();
    }

    function drawDetections(data) {
      // The server processes the frame at its native size; the overlay canvas
      // matches the video's native size, so coordinates map 1:1.
      ctx.clearRect(0, 0, overlay.width, overlay.height);
      ctx.lineWidth = Math.max(2, overlay.width / 400);
      ctx.font = `${Math.max(14, overlay.width / 45)}px system-ui, sans-serif`;
      ctx.textBaseline = 'top';

      for (const d of data.detections) {
        const color = colorFor(d.class_id);
        const w = d.x2 - d.x1;
        const h = d.y2 - d.y1;
        ctx.strokeStyle = color;
        ctx.strokeRect(d.x1, d.y1, w, h);

        const text = `${d.label} ${(d.confidence * 100).toFixed(0)}%`;
        const tw = ctx.measureText(text).width;
        const th = parseInt(ctx.font, 10) * 1.2;
        ctx.fillStyle = color;
        ctx.fillRect(d.x1, Math.max(0, d.y1 - th), tw + 8, th);
        ctx.fillStyle = '#000';
        ctx.fillText(text, d.x1 + 4, Math.max(0, d.y1 - th) + 2);
      }
      // The object count and speed live in the status line; the legend is left
      // clear for warnings and errors only.
      legendEl.textContent = '';
    }
  </script>
</body>
</html>
